name: vattify
description: "Vattify - Private Family Finance Tracker mobile app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.0.1

  # Network
  dio: ^5.4.3

  # Responsive Layout
  flutter_screenutil: ^5.9.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Formatting & UI
  intl: ^0.19.0
  skeletonizer: ^2.1.3
  fl_chart: ^0.68.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/vattify_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
